
services:
  db:
    image: leogloriainfnet/postgres-tp2-spring:2.0-win
    ports:
      - "5432:5432"
    container_name: TP2_SpringBoot
    restart: always
    environment:
      - POSTGRES_PASSWORD=1234
      - POSTGRES_USER=Aluno
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
  elastic:
    image: leogloriainfnet/elastic-tp2-spring:1.0-windows
    ports:
      - "9200:9200"
    container_name: guilda-es
    restart: always
    environment:
      - discovery.type=single-node  #sobe como um nó só, sem cluster
      - xpack.security.enabled=false #destiva autenticação de user e senha
      - ES_JAVA_OPTS=-Xms512m -Xmx512m #controle de memória
      - ELASTIC_PASSWORD=123
  app:
    build: .
    ports:
      - "9090:9090"
    container_name: Guilda_Dos_Aventureiros
    depends_on:
      db:
        condition: service_healthy
      elastic:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123
      - SPRING_ELASTICSEARCH_URIS=http://elastic:9200
      - SPRING_ELASTICSEARCH_USERNAME=elastic
      - SPRING_ELASTICSEARCH_PASSWORD=suasenha



volumes:
  pgdata: